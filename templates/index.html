<!DOCTYPE html>
<html>
<head>
    <title>Chat Bot Render</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; max-width: 600px; margin: 20px auto; background: #f0f0f0; padding: 10px; }
        #chat { background: white; border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; border-radius: 8px; }
        #input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #4f46e5; color: white; border: none; border-radius: 4px; }
        .user { color: #0066cc; margin: 8px 0; }
        .bot { color: #009900; margin: 8px 0; }
    </style>
</head>
<body>
    <h2>Chat Bot en Render 🚀</h2>
    <div id="chat"></div>
    <input id="input" placeholder="Escribe aquí..." onkeypress="if(event.key=='Enter')send()">
    <button onclick="send()">Enviar</button>

    <script>
        async function send() {
            let input = document.getElementById('input');
            let msg = input.value.trim();
            if (!msg) return;
            
            let chat = document.getElementById('chat');
            chat.innerHTML += `<div class="user"><b>Tú:</b> ${msg}</div>`;
            input.value = '';
            
            let res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            let data = await res.json();
            chat.innerHTML += `<div class="bot"><b>Bot:</b> ${data.reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
