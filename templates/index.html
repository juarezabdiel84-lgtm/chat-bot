<!DOCTYPE html>
<html>
<head>
    <title>Chat Bot en Render</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .user { color: blue; }
        .bot { color: green; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h1>Chat Bot en Render 🚀</h1>
    <div id="chat"></div>
    <input type="text" id="message" placeholder="Escribe aquí...">
    <button onclick="sendMessage()">Enviar</button>

    <script>
        async function sendMessage() {
            const messageInput = document.getElementById('message');
            const chatDiv = document.getElementById('chat');
            const message = messageInput.value;
            if (!message) return;

            chatDiv.innerHTML += `<div class="user"><strong>Tú:</strong> ${message}</div>`;
            messageInput.value = '';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            
            // CLAVE: Aquí debe decir data.response, NO data.reply
            chatDiv.innerHTML += `<div class="bot"><strong>Bot:</strong> ${data.response}</div>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        document.getElementById('message').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
